<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#07070f" />

    <!-- SEO -->
    <meta name="description" content="MoodTunes — Type any song to decode its emotion, then discover music that matches your soul in your language. Powered by iTunes. Free, no sign-in required." />
    <meta name="keywords" content="music mood, song recommendations, emotional playlist, Tamil music, Bollywood, K-pop, Hindi songs, mood playlist, iTunes music" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="MoodTunes — Music That Matches Your Soul" />
    <meta property="og:description" content="Type any song → decode its emotion → get mood-matched recommendations in your language. Free, no sign-in." />
    <meta property="og:image" content="%PUBLIC_URL%/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MoodTunes" />
    <meta name="twitter:description" content="Discover music that matches your soul — in your language." />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://itunes.apple.com" />

    <title>MoodTunes — Music That Matches Your Soul</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run MoodTunes.</noscript>
    <div id="root"></div>
  </body>
</html>
